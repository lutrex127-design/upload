<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Auftrag">
  <title>Neuer Auftrag</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }
    .header { margin-bottom: 28px; }
    .header h1 { font-size: 26px; font-weight: 800; }
    .header p { color: #64748b; font-size: 14px; margin-top: 4px; }
    .group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #1e293b;
      border: 1.5px solid #334155;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      color: #f1f5f9;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #475569; }
    .row { display: grid; grid-template-columns: 100px 1fr; gap: 10px; }
    .divider {
      height: 1px;
      background: #1e293b;
      margin: 20px 0;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .btn {
      width: 100%;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 17px;
      font-size: 17px;
      font-weight: 700;
      margin-top: 8px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    .btn:active { transform: scale(0.97); background: #4f46e5; }
    .btn:disabled { background: #334155; color: #475569; }

    /* Erfolgsscreen */
    #successView {
      display: none;
      text-align: center;
      padding: 60px 0 30px;
    }
    .success-icon { font-size: 72px; margin-bottom: 16px; }
    #successView h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    #successView p { color: #64748b; font-size: 15px; line-height: 1.6; margin-bottom: 8px; }

    .steps {
      background: #1e293b;
      border-radius: 14px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .steps p { color: #94a3b8; font-size: 14px; margin-bottom: 0; }
    .steps strong { color: #f1f5f9; }
    .step { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      width: 22px; height: 22px;
      background: #6366f1;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .step-text { font-size: 14px; color: #cbd5e1; line-height: 1.5; }

    .btn-secondary {
      width: 100%;
      background: transparent;
      color: #6366f1;
      border: 1.5px solid #6366f1;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div id="formView">
  <div class="header">
    <h1>Neuer Auftrag</h1>
    <p>Kundendaten erfassen</p>
  </div>

  <form id="form">
    <p class="section-title">Kunde</p>

    <div class="group">
      <label>Name *</label>
      <input name="name" placeholder="Max Müller" required autocomplete="name">
    </div>

    <div class="group">
      <label>Straße + Hausnummer</label>
      <input name="street" placeholder="Bahnhofstr. 5" autocomplete="street-address">
    </div>

    <div class="group row">
      <div>
        <label>PLZ</label>
        <input name="zip" placeholder="55116" inputmode="numeric" autocomplete="postal-code">
      </div>
      <div>
        <label>Stadt</label>
        <input name="city" placeholder="Mainz" autocomplete="address-level2">
      </div>
    </div>

    <div class="group">
      <label>Telefon</label>
      <input name="phone" placeholder="0151 12345678" type="tel" autocomplete="tel">
    </div>

    <div class="divider"></div>
    <p class="section-title">Leistung</p>

    <div class="group">
      <label>Beschreibung</label>
      <input name="service" placeholder="z.B. Türöffnung">
    </div>

    <div class="group">
      <label>Preis in €</label>
      <input name="price" placeholder="80" inputmode="decimal">
    </div>

    <button type="submit" class="btn" id="btn">Auftrag speichern</button>
  </form>
</div>

<div id="successView">
  <div class="success-icon">✅</div>
  <h2>Gespeichert!</h2>
  <p>Datei wurde heruntergeladen.<br>Jetzt in OneDrive ablegen:</p>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Unten auf <strong>„Teilen"</strong> tippen (das blaue Banner)</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text"><strong>„In Dateien sichern"</strong> auswählen</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">OneDrive → <strong>Rechnungstool → pending</strong> → Sichern</div>
    </div>
  </div>

  <button class="btn" onclick="neuerAuftrag()">Neuer Auftrag</button>
  <button class="btn-secondary" onclick="nochmalSpeichern()">Nochmal herunterladen</button>
</div>

<script>
  let lastData = null

  document.getElementById('form').addEventListener('submit', function(e) {
    e.preventDefault()
    const fd = new FormData(e.target)
    const price = parseFloat((fd.get('price') || '0').replace(',', '.')) || 0

    lastData = {
      name:        fd.get('name') || '',
      street:      fd.get('street') || '',
      zip:         fd.get('zip') || '',
      city:        fd.get('city') || '',
      phone:       fd.get('phone') || '',
      service:     fd.get('service') || '',
      price_cents: Math.round(price * 100),
      timestamp:   new Date().toISOString()
    }

    downloadJSON(lastData)
    document.getElementById('formView').style.display = 'none'
    document.getElementById('successView').style.display = 'block'
    window.scrollTo(0, 0)
  })

  function downloadJSON(data) {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
    const url  = URL.createObjectURL(blob)
    const a    = document.createElement('a')
    const ts   = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19)
    a.href     = url
    a.download = `Auftrag-${ts}.json`
    document.body.appendChild(a)
    a.click()
    document.body.removeChild(a)
    setTimeout(() => URL.revokeObjectURL(url), 1000)
  }

  function neuerAuftrag() {
    document.getElementById('form').reset()
    document.getElementById('successView').style.display = 'none'
    document.getElementById('formView').style.display = 'block'
    window.scrollTo(0, 0)
  }

  function nochmalSpeichern() {
    if (lastData) downloadJSON(lastData)
  }
</script>
</body>
</html>
